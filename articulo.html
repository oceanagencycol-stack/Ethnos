<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/ethnos.js"></script>
<script>
lucide.createIcons();
const slug=new URLSearchParams(location.search).get('slug');
async function loadArticle(){
  if(!slug){ showNF(); return; }
  try{
    const { data, error }=await sb.from('articles').select('*').eq('slug',slug).single();
    if(error||!data){ showNF(); return; }
    document.getElementById('loading').style.display='none';
    document.getElementById('article').style.display='block';
    document.title=data.title+' — ETHNOS';
    document.getElementById('aTitle').textContent=data.title;
    document.getElementById('aSubtitle').textContent=data.subtitle||'';
    document.getElementById('aCat').textContent=data.category||'Artículo';
    document.getElementById('aAuthor').textContent=data.author_name||'ETHNOS';
    document.getElementById('mainImg').src=data.image_url||'';
    document.getElementById('aBody').innerHTML=data.content||'';
    const url='https://ethnos.co/articulo.html?slug='+slug;
    document.getElementById('shLink').href='https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url);
    document.getElementById('shTw').href='https://twitter.com/intent/tweet?url='+encodeURIComponent(url);
    lucide.createIcons();
  }catch(e){ console.error(e); showNF(); }
}
function showNF(){ document.getElementById('loading').style.display='none'; document.getElementById('notfound').style.display='flex'; }
loadArticle();
</script>
