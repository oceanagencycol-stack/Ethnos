<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — ETHNOS</title>
<link rel="icon" href="https://res.cloudinary.com/dpo9ohngt/image/upload/v1781898805/ChatGPT_Image_19_jun_2026_14_28_12_nxh6w4.png">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Fraunces','serif'],body:['Inter','sans-serif'],mono:['"Space Mono"','monospace']},colors:{terra:{500:'#A24B2A',600:'#83391F'},ocre:{400:'#C2933D'},ivory:{100:'#FBF8F1',200:'#F5F1EA'},ink:{900:'#1B1B1B',500:'#6B6B6B'}}}}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#FBF8F1;color:#1B1B1B}
  .font-display{font-family:'Fraunces',serif}
  .inp{width:100%;padding:13px 16px;border:1.5px solid rgba(27,27,27,.12);border-radius:12px;font-size:15px;outline:none;background:#fff;transition:border-color .2s}
  .inp:focus{border-color:#A24B2A}
  .btn-terra{background:#A24B2A;color:#FBF8F1;font-weight:600;transition:transform .3s}.btn-terra:hover{transform:translateY(-2px)}
  .spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-sm">
  <div class="text-center mb-9">
    <a href="index.html"><img src="https://res.cloudinary.com/dpo9ohngt/image/upload/v1781898805/ChatGPT_Image_19_jun_2026_14_28_12_nxh6w4.png" class="h-14 mx-auto mb-6" alt="ETHNOS"></a>
    <h1 class="font-display text-2xl mb-2">Bienvenido de vuelta</h1>
    <p class="text-ink-500 text-sm">Inicia sesión en tu cuenta de ETHNOS</p>
  </div>
  <div class="space-y-4">
    <div><label class="text-sm text-ink-500 mb-1.5 block">Correo</label><input type="email" id="email" class="inp" placeholder="tu@correo.com"></div>
    <div><label class="text-sm text-ink-500 mb-1.5 block">Contraseña</label><input type="password" id="pass" class="inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
  </div>
  <button onclick="doLogin()" id="btn" class="btn-terra w-full mt-7 py-3.5 rounded-xl flex items-center justify-center gap-2">Ingresar <i data-lucide="arrow-right" class="w-4 h-4"></i></button>
  <div id="msg" class="hidden mt-5 p-3 rounded-lg text-sm text-center"></div>
  <p class="text-center text-ink-500 text-sm mt-7">¿No tienes cuenta? <a href="registro.html" class="text-terra-500 font-semibold hover:underline">Regístrate</a></p>
  <a href="index.html" class="block text-center text-ink-500/60 text-sm mt-4 hover:text-terra-500 transition-colors">← Volver al sitio</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/ethnos.js"></script>
<script>
lucide.createIcons();
(async()=>{ const p=await currentProfile(); if(p) redir(p); })();
function redir(p){
  if(p.role==='super_admin') location.href='admin.html';
  else if(p.role==='escritor') location.href='panel-escritor.html';
  else location.href='index.html';
}
async function doLogin(){
  const email=document.getElementById('email').value.trim(), pass=document.getElementById('pass').value;
  if(!email||!pass){ showMsg('Completa correo y contraseña','error'); return; }
  const btn=document.getElementById('btn'); btn.disabled=true; btn.innerHTML='<span class="inline-block w-4 h-4 border-2 border-ivory-100 border-t-transparent rounded-full spin"></span>';
  const { error }=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ btn.disabled=false; btn.innerHTML='Ingresar'; showMsg(error.message.includes('Invalid')?'Correo o contraseña incorrectos':error.message,'error'); return; }
  const p=await currentProfile(); redir(p);
}
function showMsg(t,type){const m=document.getElementById('msg');m.className='mt-5 p-3 rounded-lg text-sm text-center '+(type==='error'?'bg-terra-600/10 text-terra-600':'bg-terra-500/10 text-terra-500');m.textContent=t;m.classList.remove('hidden');}
</script>
</body>
</html>
